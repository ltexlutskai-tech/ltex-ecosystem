<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Офлайн — L-TEX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f9fafb;
      color: #111827;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 18px;
      background: #16a34a;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      background: #16a34a;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LT</div>
    <h1>Немає з'єднання з інтернетом</h1>
    <p>
      Перевірте підключення до мережі та спробуйте ще раз.
      Сайт L-TEX буде доступний, щойно з'єднання відновиться.
    </p>
    <button class="btn" onclick="window.location.reload()">Спробувати ще раз</button>
  </div>
</body>
</html>
